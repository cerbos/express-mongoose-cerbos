name: Mongoose Test

on:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        cerbos-version: ["latest"]
        mongodb-version: ["5.0", "6.0"]
        node-version: ["18"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Cerbos
        uses: cerbos/cerbos-setup-action@b274a84d6ae5e672afeabda2b713ad91f0235da6 # v1
        with:
          version: ${{ matrix.cerbos-version }}

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@315db7fe45ac2880b7758f1933e6e5d59afd5e94 # 1.12.1
        with:
          mongodb-version: ${{ matrix.mongodb-version }}

      - name: Test using Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm run test
